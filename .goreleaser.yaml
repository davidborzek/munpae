version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: munpae
    main: ./cmd/munpae
    binary: munpae
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: munpae
    formats: [tar.gz]
    name_template: "munpae_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

dockers:
  - image_templates:
      - "ghcr.io/davidborzek/munpae:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/davidborzek/munpae"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
  - image_templates:
      - "ghcr.io/davidborzek/munpae:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/davidborzek/munpae"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/davidborzek/munpae:{{ .Version }}"
    image_templates:
      - "ghcr.io/davidborzek/munpae:{{ .Version }}-amd64"
      - "ghcr.io/davidborzek/munpae:{{ .Version }}-arm64"
  - name_template: "ghcr.io/davidborzek/munpae:latest"
    image_templates:
      - "ghcr.io/davidborzek/munpae:{{ .Version }}-amd64"
      - "ghcr.io/davidborzek/munpae:{{ .Version }}-arm64"

# release-please already creates the GitHub release; goreleaser only attaches
# the built artifacts to it. The changelog is owned by release-please.
release:
  mode: append

changelog:
  disable: true
