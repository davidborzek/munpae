name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Built from source with the module's Go toolchain — prebuilt golangci-lint
      # binaries lag new Go releases and refuse to run against a newer target.
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run ./...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # govulncheck (built with the CI toolchain, so it understands the module's
      # Go version). It reports every reachable advisory, but we only *fail* on
      # ones with an available fix — unfixed upstream advisories (e.g. moby
      # daemon-side CVEs that munpae's read-only client never triggers) can't be
      # acted on and shouldn't block CI. When a fix lands, this turns red.
      - name: govulncheck (fail on fixable advisories)
        run: |
          out=$(go run golang.org/x/vuln/cmd/govulncheck@latest ./... 2>&1) || true
          echo "$out"
          if echo "$out" | grep -E '^\s*Fixed in:' | grep -qv 'N/A'; then
            echo "::error::govulncheck found advisories with an available fix — please update"
            exit 1
          fi

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Spins up a real bind server in Docker (available on the runner).
      - run: go test -tags integration ./internal/provider/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Full stack: builds the munpae binary and drives a labelled demo
      # container through to a real bind server (both in Docker).
      - run: go test -tags e2e ./test/e2e/
